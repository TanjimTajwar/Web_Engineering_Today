# Build the React app at repo root. Set REACT_APP_API_URL in Netlify
# (Site settings → Environment variables) to your Railway API, e.g.
# https://your-service.up.railway.app/api

[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  REACT_APP_API_URL = "https://jobra-hospital-6th-semester-project-production.up.railway.app/api"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
