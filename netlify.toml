# Build the React app at repo root. Set either:
#   REACT_APP_API_URL = https://webengineeringtoday-production.up.railway.app/api
# or (host only is OK):
#   REACT_APP_BACKEND_URL = webengineeringtoday-production.up.railway.app

[build]
  command = "npm run build"
  publish = "build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
